<html>
<head>
    <title>Document</title>
    <style>
        header{
            background-color: pink;
            text-align: center;
            font-size: 20px;
            font-family: cambria;
            padding: 10px;
        }
        body{
            background-color: lightblue;
            font-family : cambria;
        }
        .container{
            background-color: white;
            width : 800px;
            margin : auto;
            padding : 10px;
            border : none;
            border-radius : 8px;
            box-shadow: 0 0 10px black;
            text-align : center;
        }
        button{
            background-color : lightblue;
            font-size : 18px;
            border-radius: 8px;
            padding : 10px;
        }
        button:hover {
            background-color: darkblue;
        }
        input{
            border-radius : 8px;
            font-size : 20px;
            color : black;
            width : 700px;
            margin : auto;
            padding : 10px;
        }
        #result{
            font-size : 30px;
            color: Black;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header><h1>SIMPLE INTEREST CALCULATOR</h1></header>
    <br><br>
    <div class="container"><br>
        <input type="number" id="principal" placeholder="Enter the principal amount "><br><br>
        <input type="number" id="rate" placeholder="Enter the rate of interest"><br><br>
        <input type="number" id="time" placeholder="Enter the time period"><br><br>
        <button onclick="calculateSI()">Calculate SI</button><br>
        <br><br>
        <div id="result"></div>
    </div>
    <script>
        function calculateSI(){
            let p = document.getElementById("principal").value;
            let r = document.getElementById("rate").value;
            let t = document.getElementById("time").value;

            if( p === "" || r === "" || t === ""){
                alert("Please fill all the fields !!!");
                return;
            }

            let si = (p*r*t)/100;
            
            document.getElementById("result").innerHTML = "Simple Interest : " + si ;
        }
    </script>
</body>
</html>
