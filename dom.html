<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D0M Manupulation</title>
</head>
<body>
    <h1 id="heading">Welcome to DOM Manupulation</h1>
    <p class="para">This is my paragraph.</p>
    <script>
        let newheading = document.getElementById("heading");
        newheading.textContent = "DOM Manipulation";
        newheading.style.color = "Red";
        newheading.style.fontSize = "xx-large";

        let paragraph = document.getElementsByClassName("para");
        paragraph[0].textContent = "New updated paragraph.";
        paragraph[0].style.color = "Blue";
        paragraph[0].style.fontSize = "50px";
    </script>
</body>
</html>
